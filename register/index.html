<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - videobelajar</title>

    <!-- feather icon-->
    <script src="https://unpkg.com/feather-icons"></script>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- style -->
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="../img/logo.png" alt="videobelajar" />
      </div>
    </header>

    <main>
      <div class="container">
        <h1>Pendaftaran Akun</h1>
        <p>Yuk, daftarkan akunmu sekarang juga!</p>
        <br />
        <form action="#">
          <label for="name">Nama Lengkap <span class="required">*</span></label>
          <br />
          <input type="text" class="name" />

          <label for="email">E-Mail <span class="required">*</span></label>
          <br />
          <input type="email" class="email" required />

          <label for="gender"
            >Jenis Kelamin <span class="required">*</span></label
          >
          <br />
          <select name="gender" id="gender">
            <option value=""></option>
            <option value="male">Pria</option>
            <option value="female">Wanita</option>
          </select>

          <div class="phone-wraper">
            <label for="phone-number"
              >No. Hp <span class="required">*</span></label
            >
            <div class="phone-group">
              <div class="country-select">
                <img src="../img/flag.png" alt="IDN" />
              </div>
              <select name="phncode" id="phncode">
                <option value="+62">+62</option>
              </select>
              <input type="tel" class="phone-number" required />
            </div>
          </div>

          <label for="password"
            >Kata Sandi <span class="required">*</span></label
          >
          <br />

          <div class="password-wraper">
            <input type="password" class="password" />
            <i data-feather="eye-off" class="toggle"></i>
          </div>

          <label for="password-confirm"
            >Konfirmasi Kata Sandi <span class="required">*</span></label
          >
          <br />

          <div class="password-wraper">
            <input type="password" class="password" />
            <i data-feather="eye-off" class="toggle"></i>
          </div>

          <div class="forgot-password">
            <a href="#">Lupa Password?</a>
          </div>

          <button type="submit" class="login">Daftar</button>
          <br />
          <button type="button" class="register">Masuk</button>

          <div class="devider">atau</div>

          <div class="login-google">
            <button type="button">
              <img src="../img/google-logo.png" alt="google" />Daftar dengan
              Google
            </button>
          </div>
        </form>
      </div>
    </main>

    <!-- feather icon -->
    <script>
      feather.replace();
    </script>
  </body>
</html>
