<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - videobelajar</title>

    <!-- feather icon-->
    <script src="https://unpkg.com/feather-icons"></script>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- style -->
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="../img/logo.png" alt="videobelajar" />
      </div>
    </header>

    <main>
      <div class="container">
        <h1>Masuk ke Akun</h1>
        <p>Yuk, lanjutin belajarmu di videobelajar.</p>
        <br />

        <form action="#">
          <label for="email">E-Mail <span class="required">*</span></label>
          <br />
          <input type="email" class="email" required />

          <label for="password"
            >Kata Sandi <span class="required">*</span></label
          >
          <br />

          <div class="password-wraper">
            <input type="password" class="password" />
            <i data-feather="eye-off" class="toggle"></i>
          </div>

          <div class="forgot-password">
            <a href="#">Lupa Password?</a>
          </div>

          <button type="submit" class="login">Masuk</button>
          <br />
          <button type="button" class="register">Daftar</button>

          <div class="devider">atau</div>

          <div class="login-google">
            <button type="button">
              <img src="../img/google-logo.png" alt="google" />Masuk dengan
              Google
            </button>
          </div>
        </form>
      </div>
    </main>

    <!-- feather icon -->
    <script>
      feather.replace();
    </script>
  </body>
</html>
